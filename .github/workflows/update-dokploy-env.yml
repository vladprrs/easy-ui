name: update-dokploy-env
# Одноразовый workflow (план multiuser-custom-only, A.4): добавляет ADMIN_NAME/ADMIN_PASSWORD/
# LEGACY_BASIC_AUTH в env Dokploy-сервиса из уже существующего BASIC_AUTH.
# Никаких новых секретов: всё выводится из secrets.DOKPLOY_API_KEY и текущего env сервиса.
# Удаляется после применения.

on:
  push:
    branches: [feature/multiuser-custom-only]
    paths: [.github/workflows/update-dokploy-env.yml]

permissions: {}

jobs:
  update-env:
    runs-on: ubuntu-latest
    steps:
      - name: Append auth env vars via Dokploy API
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
        run: |
          node - <<'EOF'
          const k = process.env.DOKPLOY_API_KEY;
          const base = "https://dokploy.pay-offline.ru/api";
          const id = "CWXPcz6h6L_cyYSwG9V92";
          const main = async () => {
            const c = await (await fetch(`${base}/compose.one?composeId=${id}`, { headers: { "x-api-key": k } })).json();
            const lines = (c.env || "").split("\n").filter(Boolean);
            const has = (name) => lines.some((l) => l.startsWith(name + "="));
            if (has("ADMIN_NAME") && has("ADMIN_PASSWORD") && has("LEGACY_BASIC_AUTH")) {
              console.log("env already up to date"); return;
            }
            const basic = lines.find((l) => l.startsWith("BASIC_AUTH="));
            if (!basic) throw new Error("BASIC_AUTH not found in current env");
            const value = basic.slice("BASIC_AUTH=".length);
            const [user, ...pw] = value.split(":");
            const next = [...lines];
            if (!has("LEGACY_BASIC_AUTH")) next.push(`LEGACY_BASIC_AUTH=${value}`);
            if (!has("ADMIN_NAME")) next.push(`ADMIN_NAME=${user}`);
            if (!has("ADMIN_PASSWORD")) next.push(`ADMIN_PASSWORD=${pw.join(":")}`);
            const r = await fetch(`${base}/compose.update`, {
              method: "POST",
              headers: { "x-api-key": k, "content-type": "application/json" },
              body: JSON.stringify({ composeId: id, env: next.join("\n") }),
            });
            console.log("compose.update ->", r.status);
            if (!r.ok) { console.log((await r.text()).slice(0, 300)); process.exit(1); }
            console.log("env updated: +LEGACY_BASIC_AUTH +ADMIN_NAME +ADMIN_PASSWORD");
          };
          main().catch((e) => { console.error(e.message); process.exit(1); });
          EOF
